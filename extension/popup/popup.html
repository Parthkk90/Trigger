<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigger</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8787 https:;">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fafafa;
      color: #1e1b4b;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: #4f46e5;
      color: #fff;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header .version {
      font-size: 10px;
      opacity: 0.6;
      margin-left: auto;
      margin-right: 8px;
    }
    .settings-btn {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .controls {
      padding: 16px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-record {
      background: #dc2626;
      color: #fff;
    }
    .btn-record:hover:not(:disabled) {
      background: #b91c1c;
    }
    .btn-record.active {
      background: #991b1b;
      animation: recordPulse 1.5s infinite;
    }
    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
    }
    .btn-stop {
      background: #374151;
      color: #fff;
    }
    .btn-stop:hover:not(:disabled) {
      background: #1f2937;
    }

    .status-bar {
      padding: 8px 16px;
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-dot.idle { background: #9ca3af; }
    .status-dot.recording { background: #dc2626; animation: pulse 1s infinite; }
    .status-dot.replaying { background: #4f46e5; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .notice {
      margin: 10px 16px 0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.35;
      border: 1px solid;
      word-break: break-word;
      display: none;
    }
    .notice.info {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .notice.success {
      background: #ecfdf5;
      border-color: #a7f3d0;
      color: #047857;
    }
    .notice.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    .workflows {
      padding: 12px 16px;
      max-height: 300px;
      overflow-y: auto;
    }
    .workflows h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .workflow-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: default;
      transition: all 0.15s;
    }
    .workflow-item:hover {
      border-color: #c7d2fe;
      background: #eef2ff;
    }
    .workflow-info {
      flex: 1;
      min-width: 0;
    }
    .workflow-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .workflow-meta {
      font-size: 11px;
      color: #9ca3af;
    }
    .workflow-actions {
      display: flex;
      gap: 4px;
    }
    .workflow-actions button {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }
    .btn-play {
      background: #eef2ff;
      color: #4f46e5;
    }
    .btn-play:hover {
      background: #c7d2fe;
    }
    .btn-delete {
      background: #fef2f2;
      color: #dc2626;
    }
    .btn-delete:hover {
      background: #fecaca;
    }
    .btn-export {
      background: #f0fdf4;
      color: #059669;
    }
    .btn-export:hover {
      background: #bbf7d0;
    }
    .btn-share {
      background: #f3f0ff;
      color: #7c3aed;
    }
    .btn-share:hover {
      background: #ede9fe;
    }

    .empty-state {
      text-align: center;
      padding: 30px 16px;
      color: #9ca3af;
      font-size: 13px;
    }
    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Trigger</h1>
    <span class="version">v0.1.0</span>
    <button class="settings-btn" id="btn-settings" title="Backend URL">⚙</button>
  </div>

  <div class="controls" id="controls">
    <button class="btn btn-record" id="btn-record">
      <span>●</span> Record
    </button>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="status-dot idle" id="status-dot"></div>
    <span id="status-text">Ready</span>
  </div>

  <div class="notice" id="notice"></div>

  <div class="workflows" id="workflows">
    <h2>Saved Workflows</h2>
    <div id="workflow-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
